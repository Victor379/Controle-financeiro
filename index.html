
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surf:#1a1d27;--surf2:#222535;--brd:#2e3148;
  --acc:#6ee7b7;--dan:#fb7185;--blu:#60a5fa;
  --txt:#e8eaf0;--mut:#7c8099;--rad:12px;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:0}
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
</style>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#6ee7b7;--dan:#fb7185;--blu:#60a5fa;
  --txt:#e8eaf0;--mut:#7c8099;--surf:#1a1d27;--surf2:#222535;--brd:#2e3148;
}
body{font-family:'Sora',sans-serif;background:#0f1117;color:var(--txt);padding:0 0 40px}

nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--surf);border-bottom:1px solid var(--brd);margin-bottom:20px}
.logo{font-size:1.1rem;font-weight:700;letter-spacing:-.5px}
.logo span{color:var(--acc)}

.wrap{max-width:1060px;margin:0 auto;padding:0 16px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;font-family:'Sora',sans-serif;font-size:.82rem;font-weight:600;transition:all .15s}
.btn-acc{background:var(--acc);color:#072b1a}
.btn-acc:hover{filter:brightness(1.1)}
.btn-out{background:transparent;border:1px solid var(--brd);color:var(--txt)}
.btn-out:hover{background:var(--surf2)}
.btn-sm{padding:6px 11px;font-size:.75rem}

.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.filter-bar select{background:var(--surf);border:1px solid var(--brd);color:var(--txt);border-radius:9px;padding:7px 12px;font-family:'Sora',sans-serif;font-size:.8rem;cursor:pointer;outline:none}
.filter-bar select:focus{border-color:var(--acc)}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
@media(max-width:580px){.cards{grid-template-columns:1fr}}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:18px 18px 14px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.r::before{background:var(--acc)}
.card.d::before{background:var(--dan)}
.card.s::before{background:var(--blu)}
.card-lbl{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin-bottom:8px}
.card-val{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:500;line-height:1;margin-bottom:5px}
.card.r .card-val{color:var(--acc)}
.card.d .card-val{color:var(--dan)}
.card.s .card-val{color:var(--blu)}
.card-sub{font-size:.7rem;color:var(--mut)}

.grid2{display:grid;grid-template-columns:1fr 300px;gap:16px}
@media(max-width:800px){.grid2{grid-template-columns:1fr}}

.box{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:18px}
.box-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.box-title{font-size:.88rem;font-weight:600}

table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;padding:8px 12px;color:var(--mut);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--brd)}
td{padding:10px 12px;border-bottom:1px solid rgba(46,49,72,.4);vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:rgba(255,255,255,.018)}

.pill{display:inline-block;padding:3px 8px;border-radius:20px;font-size:.68rem;font-weight:600}
.pe{background:rgba(110,231,183,.13);color:var(--acc)}
.pg{background:rgba(251,113,133,.13);color:var(--dan)}
.ve{color:var(--acc);font-family:'JetBrains Mono',monospace;font-weight:500}
.vg{color:var(--dan);font-family:'JetBrains Mono',monospace;font-weight:500}

.del{background:none;border:none;color:var(--mut);cursor:pointer;font-size:.95rem;padding:0;transition:color .15s}
.del:hover{color:var(--dan)}

.empty{text-align:center;padding:32px;color:var(--mut);font-size:.8rem}

.bar-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.bar-lbl{font-size:.7rem;color:var(--mut);display:flex;justify-content:space-between;margin-bottom:3px}
.bar-track{height:7px;background:var(--surf2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bf-e{background:var(--acc)}
.bf-g{background:var(--dan)}

.cat-item{display:flex;align-items:center;gap:8px;font-size:.78rem;margin-bottom:8px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-name{flex:1;color:var(--mut)}
.cat-val{font-family:'JetBrains Mono',monospace;font-size:.75rem}

/* OVERLAY COMO ELEMENTO NORMAL DE LAYOUT PARA EVITAR POSITION:FIXED */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;align-items:center;justify-content:center}
.modal-wrap.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:24px;width:min(90vw,440px)}
.modal-title{font-size:.95rem;font-weight:700;margin-bottom:16px}

.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:.7rem;color:var(--mut);font-weight:500}
.fg input,.fg select{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;padding:8px 11px;font-family:'Sora',sans-serif;font-size:.82rem;outline:none;width:100%;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:var(--acc)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:420px){.fg2{grid-template-columns:1fr}}

.tipo-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.tbtn{padding:8px;border-radius:8px;border:1px solid var(--brd);background:var(--surf2);color:var(--mut);cursor:pointer;font-family:'Sora',sans-serif;font-size:.8rem;font-weight:600;text-align:center;transition:all .15s}
.tbtn.ae{background:rgba(110,231,183,.12);border-color:var(--acc);color:var(--acc)}
.tbtn.ag{background:rgba(251,113,133,.12);border-color:var(--dan);color:var(--dan)}

.toast{position:fixed;bottom:20px;right:20px;background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:10px 16px;font-size:.8rem;box-shadow:0 6px 24px rgba(0,0,0,.4);transform:translateY(60px);opacity:0;transition:all .22s;z-index:200;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--acc);color:var(--acc)}
.toast.err{border-color:var(--dan);color:var(--dan)}
</style>

<nav>
  <div class="logo">Fin<span>Track</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="nav-mes" style="font-size:.75rem;color:var(--mut);font-family:'JetBrains Mono',monospace"></span>
    <button class="btn btn-acc" onclick="openModal()">+ Lançamento</button>
  </div>
</nav>

<div class="wrap">
  <div class="filter-bar">
    <select id="sel-mes" onchange="render()">
      <option value="0">Janeiro</option><option value="1">Fevereiro</option>
      <option value="2">Março</option><option value="3">Abril</option>
      <option value="4">Maio</option><option value="5">Junho</option>
      <option value="6">Julho</option><option value="7">Agosto</option>
      <option value="8">Setembro</option><option value="9">Outubro</option>
      <option value="10">Novembro</option><option value="11">Dezembro</option>
    </select>
    <select id="sel-ano" onchange="render()"></select>
    <button class="btn btn-out btn-sm" onclick="exportCSV()">↓ Exportar CSV</button>
    <button class="btn btn-out btn-sm" onclick="gerarPlanilha()">≡ Planilha Mensal</button>
  </div>

  <div class="cards">
    <div class="card r">
      <div class="card-lbl">Receita Total</div>
      <div class="card-val" id="cv-r">R$ 0,00</div>
      <div class="card-sub" id="cs-r">0 entradas</div>
    </div>
    <div class="card d">
      <div class="card-lbl">Despesas Totais</div>
      <div class="card-val" id="cv-d">R$ 0,00</div>
      <div class="card-sub" id="cs-d">0 gastos</div>
    </div>
    <div class="card s">
      <div class="card-lbl">Saldo do Mês</div>
      <div class="card-val" id="cv-s">R$ 0,00</div>
      <div class="card-sub" id="cs-s">–</div>
    </div>
  </div>

  <div class="grid2">
    <div class="box">
      <div class="box-hd">
        <span class="box-title">Lançamentos</span>
        <span id="qtd" style="font-size:.72rem;color:var(--mut)"></span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th><th>Valor</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty" id="empty" style="display:none">Nenhum lançamento neste período.</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="box">
        <div class="box-title" style="margin-bottom:14px">Resumo Visual</div>
        <div class="bar-row">
          <div class="bar-lbl"><span>Entradas</span><span id="lbl-e" style="color:var(--acc)">R$ 0</span></div>
          <div class="bar-track"><div class="bar-fill bf-e" id="bar-e" style="width:0%"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-lbl"><span>Gastos</span><span id="lbl-g" style="color:var(--dan)">R$ 0</span></div>
          <div class="bar-track"><div class="bar-fill bf-g" id="bar-g" style="width:0%"></div></div>
        </div>
        <canvas id="spark" style="width:100%;height:56px;margin-top:10px;display:block"></canvas>
      </div>
      <div class="box">
        <div class="box-title" style="margin-bottom:12px">Gastos por Categoria</div>
        <div id="cat-list"><div style="color:var(--mut);font-size:.76rem">Nenhum dado.</div></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-wrap" id="modal-wrap" onclick="clickOverlay(event)">
  <div class="modal">
    <div class="modal-title">Novo Lançamento</div>
    <div class="tipo-toggle">
      <div class="tbtn ae" id="btn-e" onclick="setTipo('entrada')">↑ Entrada</div>
      <div class="tbtn" id="btn-g" onclick="setTipo('gasto')">↓ Gasto</div>
    </div>
    <div class="fg2">
      <div class="fg">
        <label>Descrição</label>
        <input type="text" id="f-desc" placeholder="Ex: Salário, Aluguel...">
      </div>
      <div class="fg">
        <label>Valor (R$)</label>
        <input type="number" id="f-valor" placeholder="0.00" min="0.01" step="0.01">
      </div>
      <div class="fg">
        <label>Categoria</label>
        <select id="f-cat"></select>
      </div>
      <div class="fg">
        <label>Data</label>
        <input type="date" id="f-data">
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn btn-out" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-acc" style="flex:1" id="btn-salvar">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CAT_E=['Salário','Freelance','Vendas','Investimentos','Outros'];
const CAT_G=['Alimentação','Transporte','Contas','Saúde','Lazer','Educação','Moradia','Outros'];
const CORES={'Alimentação':'#f472b6','Transporte':'#60a5fa','Contas':'#a78bfa','Saúde':'#34d399','Lazer':'#fb923c','Educação':'#fbbf24','Moradia':'#e879f9','Outros':'#94a3b8','Salário':'#6ee7b7','Freelance':'#4ade80','Vendas':'#86efac','Investimentos':'#67e8f9'};

let dados=[];
let tipoAtual='entrada';

function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function fmt(v){return'R$ '+Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(s){const d=new Date(s+'T12:00:00');return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}

function getMF(){return{m:parseInt(document.getElementById('sel-mes').value),a:parseInt(document.getElementById('sel-ano').value)}}
function filtrados(){const{m,a}=getMF();return dados.filter(l=>{const d=new Date(l.data+'T12:00:00');return d.getMonth()===m&&d.getFullYear()===a})}

function render(){
  const{m,a}=getMF();
  document.getElementById('nav-mes').textContent=MESES[m]+' '+a;
  const lista=filtrados();
  const ent=lista.filter(l=>l.tipo==='entrada');
  const gas=lista.filter(l=>l.tipo==='gasto');
  const totE=ent.reduce((s,l)=>s+l.valor,0);
  const totG=gas.reduce((s,l)=>s+l.valor,0);
  const sal=totE-totG;

  document.getElementById('cv-r').textContent=fmt(totE);
  document.getElementById('cs-r').textContent=ent.length+' entrada'+(ent.length!==1?'s':'');
  document.getElementById('cv-d').textContent=fmt(totG);
  document.getElementById('cs-d').textContent=gas.length+' gasto'+(gas.length!==1?'s':'');
  document.getElementById('cv-s').textContent=fmt(sal);
  document.getElementById('cs-s').textContent=sal>=0?'Positivo':'Negativo';
  document.getElementById('cv-s').style.color=sal>=0?'var(--blu)':'var(--dan)';

  const sorted=[...lista].sort((a,b)=>b.data.localeCompare(a.data));
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=sorted.map(l=>`<tr>
    <td style="color:var(--mut);font-family:'JetBrains Mono',monospace;font-size:.72rem">${fmtD(l.data)}</td>
    <td><span class="pill ${l.tipo==='entrada'?'pe':'pg'}">${l.tipo==='entrada'?'↑ Entrada':'↓ Gasto'}</span></td>
    <td style="color:var(--mut)">${l.categoria}</td>
    <td>${l.descricao}</td>
    <td class="${l.tipo==='entrada'?'ve':'vg'}">${l.tipo==='entrada'?'+ ':'- '}${fmt(l.valor)}</td>
    <td><button class="del" onclick="del('${l.id}')">✕</button></td>
  </tr>`).join('');
  document.getElementById('empty').style.display=lista.length?'none':'block';
  document.getElementById('qtd').textContent=lista.length+' lançamento'+(lista.length!==1?'s':'');

  const mx=Math.max(totE,totG,1);
  document.getElementById('bar-e').style.width=(totE/mx*100)+'%';
  document.getElementById('bar-g').style.width=(totG/mx*100)+'%';
  document.getElementById('lbl-e').textContent=fmt(totE);
  document.getElementById('lbl-g').textContent=fmt(totG);

  renderSpark(lista,m,a);
  renderCat(gas);
}

function renderSpark(lista,mes,ano){
  const canvas=document.getElementById('spark');
  const W=canvas.offsetWidth||260,H=56;
  canvas.width=W*2;canvas.height=H*2;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(2,2);ctx.clearRect(0,0,W,H);
  const dias=new Date(ano,mes+1,0).getDate();
  let s=0;const pts=[];
  for(let d=1;d<=dias;d++){
    const ds=`${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    lista.filter(l=>l.data===ds).forEach(l=>{s+=l.tipo==='entrada'?l.valor:-l.valor});
    pts.push(s);
  }
  if(pts.every(v=>v===0))return;
  const mn=Math.min(...pts),mx=Math.max(...pts);
  const range=mx-mn||1;
  const xs=pts.map((v,i)=>(i/(dias-1))*(W-4)+2);
  const ys=pts.map(v=>H-6-((v-mn)/range)*(H-12));
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(110,231,183,.25)');grad.addColorStop(1,'rgba(110,231,183,0)');
  ctx.beginPath();ctx.moveTo(xs[0],H);
  xs.forEach((x,i)=>ctx.lineTo(x,ys[i]));
  ctx.lineTo(xs[xs.length-1],H);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();xs.forEach((x,i)=>i===0?ctx.moveTo(x,ys[i]):ctx.lineTo(x,ys[i]));
  ctx.strokeStyle='#6ee7b7';ctx.lineWidth=1.5;ctx.stroke();
}

function renderCat(gas){
  const map={};gas.forEach(l=>map[l.categoria]=(map[l.categoria]||0)+l.valor);
  const cats=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const el=document.getElementById('cat-list');
  if(!cats.length){el.innerHTML='<div style="color:var(--mut);font-size:.76rem">Nenhum gasto registrado.</div>';return}
  el.innerHTML=cats.map(([c,v])=>`<div class="cat-item"><div class="cat-dot" style="background:${CORES[c]||'#888'}"></div><span class="cat-name">${c}</span><span class="cat-val" style="color:${CORES[c]||'#888'}">${fmt(v)}</span></div>`).join('');
}

function del(id){dados=dados.filter(l=>l.id!==id);render();toast('Removido.','ok')}

function setTipo(t){
  tipoAtual=t;
  document.getElementById('btn-e').className='tbtn'+(t==='entrada'?' ae':'');
  document.getElementById('btn-g').className='tbtn'+(t==='gasto'?' ag':'');
  const sel=document.getElementById('f-cat');
  sel.innerHTML=(t==='entrada'?CAT_E:CAT_G).map(c=>`<option>${c}</option>`).join('');
}

function openModal(){
  document.getElementById('f-desc').value='';
  document.getElementById('f-valor').value='';
  const hoje=new Date();
  const{m,a}=getMF();
  const d=new Date(a,m,hoje.getDate()<=new Date(a,m+1,0).getDate()?hoje.getDate():1);
  document.getElementById('f-data').value=d.toISOString().split('T')[0];
  setTipo('entrada');
  document.getElementById('modal-wrap').classList.add('open');
  setTimeout(()=>document.getElementById('f-desc').focus(),80);
}
function closeModal(){document.getElementById('modal-wrap').classList.remove('open')}
function clickOverlay(e){if(e.target===document.getElementById('modal-wrap'))closeModal()}

document.getElementById('btn-salvar').onclick=function(){
  const desc=document.getElementById('f-desc').value.trim();
  const valStr=document.getElementById('f-valor').value;
  const valor=parseFloat(valStr);
  const cat=document.getElementById('f-cat').value;
  const data=document.getElementById('f-data').value;
  if(!desc){toast('Informe a descrição.','err');document.getElementById('f-desc').focus();return}
  if(!valStr||isNaN(valor)||valor<=0){toast('Informe um valor válido.','err');document.getElementById('f-valor').focus();return}
  if(!data){toast('Informe a data.','err');return}
  dados.push({id:uid(),tipo:tipoAtual,descricao:desc,valor,categoria:cat,data});
  closeModal();render();toast('Lançamento salvo!','ok');
};

function toast(msg,tipo){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+tipo;
  setTimeout(()=>el.classList.add('show'),10);
  setTimeout(()=>{el.classList.remove('show')},2600);
}

function exportCSV(){
  const{m,a}=getMF();
  const lista=filtrados();
  if(!lista.length){toast('Nenhum dado.','err');return}
  const totE=lista.filter(l=>l.tipo==='entrada').reduce((s,l)=>s+l.valor,0);
  const totG=lista.filter(l=>l.tipo==='gasto').reduce((s,l)=>s+l.valor,0);
  const rows=[['Data','Tipo','Categoria','Descrição','Valor']];
  [...lista].sort((a,b)=>a.data.localeCompare(b.data)).forEach(l=>{
    rows.push([l.data,l.tipo==='entrada'?'Entrada':'Gasto',l.categoria,l.descricao,l.valor.toFixed(2).replace('.',',')]);
  });
  rows.push([]);
  rows.push(['','','','Total Entradas',totE.toFixed(2).replace('.',',')]);
  rows.push(['','','','Total Gastos',totG.toFixed(2).replace('.',',')]);
  rows.push(['','','','Saldo',((totE-totG)).toFixed(2).replace('.',',')]);
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(';')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a2=document.createElement('a');a2.href=URL.createObjectURL(blob);
  a2.download=`fintrack_${MESES[m].toLowerCase()}_${a}.csv`;a2.click();
  toast('CSV exportado!','ok');
}

function gerarPlanilha(){
  const{m,a}=getMF();
  const lista=filtrados();
  const sorted=[...lista].sort((a,b)=>a.data.localeCompare(b.data));
  const totE=lista.filter(l=>l.tipo==='entrada').reduce((s,l)=>s+l.valor,0);
  const totG=lista.filter(l=>l.tipo==='gasto').reduce((s,l)=>s+l.valor,0);
  const sal=totE-totG;
  const rows=sorted.map(l=>`<tr><td>${new Date(l.data+'T12:00:00').toLocaleDateString('pt-BR')}</td><td style="color:${l.tipo==='entrada'?'#16a34a':'#dc2626'};font-weight:600">${l.tipo==='entrada'?'Entrada':'Gasto'}</td><td>${l.categoria}</td><td>${l.descricao}</td><td style="text-align:right;font-family:monospace">${l.tipo==='entrada'?'+ ':'- '}R$ ${l.valor.toFixed(2).replace('.',',')}</td></tr>`).join('');
  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>FinTrack — ${MESES[m]} ${a}</title>
  <style>body{font-family:Arial,sans-serif;padding:32px;background:#f9fafb;color:#111}h1{color:#1a1a2e;margin-bottom:4px}p{color:#666;margin-bottom:20px}table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}th{background:#1a1a2e;color:#fff;padding:11px 14px;text-align:left;font-size:13px}td{padding:10px 14px;border-bottom:1px solid #eee;font-size:13px}tr:last-child td{border:none}.res{margin-top:24px;background:#fff;border-radius:8px;padding:18px;display:flex;gap:28px;flex-wrap:wrap}.ri label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.5px;display:block}.ri strong{font-size:1.2rem;font-family:monospace}.g{color:#16a34a}.r{color:#dc2626}</style></head>
  <body><h1>FinTrack — ${MESES[m]} ${a}</h1><p>Relatório gerado em ${new Date().toLocaleDateString('pt-BR')}</p>
  <table><thead><tr><th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th><th style="text-align:right">Valor</th></tr></thead>
  <tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:#999;padding:24px">Nenhum lançamento</td></tr>'}</tbody></table>
  <div class="res"><div class="ri"><label>Entradas</label><strong class="g">R$ ${totE.toFixed(2).replace('.',',')}</strong></div><div class="ri"><label>Gastos</label><strong class="r">R$ ${totG.toFixed(2).replace('.',',')}</strong></div><div class="ri"><label>Saldo</label><strong class="${sal>=0?'g':'r'}">R$ ${sal.toFixed(2).replace('.',',')}</strong></div></div>
  </body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a2=document.createElement('a');a2.href=URL.createObjectURL(blob);
  a2.download=`planilha_${MESES[m].toLowerCase()}_${a}.html`;a2.click();
  toast('Planilha gerada!','ok');
}
